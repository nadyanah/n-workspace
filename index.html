<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n-workspace</title>
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Load Vue 3 Global from CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Load SheetJS for Excel Exports and jsPDF + autoTable for PDF Exports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Font dari Dafont font-family: 'Hack', monospace; -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">
  <!-- Reminder Popup Styles -->
  <style>
    /* ── Reminder Popup ── */
    .reminder-popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .reminder-popup-card {
      background: var(--color-paper, #FAF7F2);
      border-radius: 18px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.10);
      width: min(380px, 90vw);
      overflow: hidden;
      font-family: inherit;
    }
    .reminder-popup-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--color-sand-light, #EDE8E1);
      background: var(--color-terracotta, #D67B52);
      color: #fff;
    }
    .reminder-popup-icon-wrap {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.22);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .reminder-popup-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .reminder-popup-date {
      font-size: 12px;
      opacity: 0.82;
      margin-top: 1px;
    }
    .reminder-popup-body {
      padding: 16px 20px 12px;
    }
    .reminder-popup-intro {
      font-size: 13px;
      color: var(--text-secondary, #7A6F66);
      margin: 0 0 12px;
    }
    .reminder-popup-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      background: var(--color-cream, #FDF5EB);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 3px solid var(--color-terracotta, #D67B52);
    }
    .reminder-popup-item-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-terracotta, #D67B52);
      background: rgba(214,123,82,0.12);
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      margin-top: 1px;
      font-family: 'Hack', monospace, sans-serif;
    }
    .reminder-popup-item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary, #3D2E22);
    }
    .reminder-popup-item-sub {
      font-size: 11.5px;
      color: var(--text-muted, #A09690);
      margin-top: 2px;
    }
    .reminder-popup-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px 18px;
      justify-content: flex-end;
    }
    .reminder-popup-btn-open {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--color-terracotta, #D67B52);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
    }
    .reminder-popup-btn-open:hover { background: var(--color-terracotta-dark, #B8663F); transform: scale(1.03); }
    .reminder-popup-btn-dismiss {
      padding: 9px 14px;
      background: transparent;
      border: 1.5px solid var(--color-sand, #C8BDB5);
      color: var(--text-secondary, #7A6F66);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .reminder-popup-btn-dismiss:hover { background: var(--color-sand-light, #EDE8E1); }

    /* ── Rich Text Editor (Insight) ── */
    [contenteditable][data-placeholder]:empty:before {
      content: attr(data-placeholder);
      color: #A09690;
      pointer-events: none;
      font-style: italic;
      font-size: 13.5px;
    }
    [contenteditable]:focus {
      border-color: var(--color-terracotta, #D67B52) !important;
      box-shadow: 0 0 0 3px rgba(214,123,82,0.12);
    }
    /* Styling hasil rich text di editor dan timeline */
    [contenteditable] h3, .insight-rich-content h3 { font-size: 15px; font-weight: 800; color: var(--text-dark); margin: 10px 0 5px; }
    [contenteditable] ul, .insight-rich-content ul { padding-left: 20px; margin: 6px 0; }
    [contenteditable] ol, .insight-rich-content ol { padding-left: 20px; margin: 6px 0; }
    [contenteditable] li, .insight-rich-content li { margin-bottom: 3px; line-height: 1.6; }
    [contenteditable] p, .insight-rich-content p { margin: 4px 0; line-height: 1.7; }

    /* ── Insight Modal Popup Animation ── */
    @keyframes insightPopIn {
      from { opacity: 0; transform: scale(0.88) translateY(18px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .insight-modal-fade-enter-active { animation: insightPopIn 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .insight-modal-fade-leave-active { animation: insightPopIn 0.18s ease-in reverse; }

    /* Transition */
    .reminder-popup-fade-enter-active { animation: reminder-pop-in 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .reminder-popup-fade-leave-active { animation: reminder-pop-out 0.18s ease-in; }
    @keyframes reminder-pop-in {
      from { opacity: 0; transform: scale(0.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes reminder-pop-out {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.92) translateY(8px); }
    }

    /* ── ReminderPopup: extensions untuk mode live, missed, carousel ── */

    /* Header amber untuk mode missed */
    .reminder-popup-header-amber {
      background: var(--color-amber, #C8943A) !important;
    }

    /* Counter slide (X / N) di pojok kanan header */
    .reminder-popup-counter {
      font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,0.25);
      padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
      letter-spacing: 0.4px;
    }

    /* Progress dots carousel */
    .reminder-popup-dots {
      display: flex; justify-content: center; gap: 7px;
      padding: 2px 20px 12px;
    }
    .reminder-popup-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-sand, #C8BDB5);
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
      flex-shrink: 0;
    }
    .reminder-popup-dot-active {
      background: var(--color-amber, #C8943A);
      transform: scale(1.4);
    }

    /* Tombol nav (Sebelumnya) */
    .reminder-popup-btn-nav {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 12px;
      background: transparent;
      border: 1.5px solid var(--color-sand, #C8BDB5);
      color: var(--text-secondary, #7A6F66);
      border-radius: 10px; font-size: 12px;
      cursor: pointer; transition: background 0.15s;
    }
    .reminder-popup-btn-nav:hover { background: var(--color-sand-light, #EDE8E1); }

    /* Tombol primary amber (mode missed: Berikutnya / Oke Mengerti) */
    .reminder-popup-btn-amber {
      background: var(--color-amber, #C8943A) !important;
    }
    .reminder-popup-btn-amber:hover { filter: brightness(0.9); }

    /* Item style untuk mode missed — mirip open tapi warna amber */
    .reminder-popup-item-missed {
      border-left-color: var(--color-amber, #C8943A);
      background: #FFFBF2;
    }
    .reminder-popup-item-time-missed {
      color: var(--color-amber, #C8943A) !important;
      background: rgba(200,148,58,0.12) !important;
    }

    /* Slide transitions untuk carousel */
    .rp-slide-left-enter-active, .rp-slide-left-leave-active,
    .rp-slide-right-enter-active, .rp-slide-right-leave-active {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rp-slide-left-enter-from  { opacity: 0; transform: translateX(36px); }
    .rp-slide-left-leave-to    { opacity: 0; transform: translateX(-36px); }
    .rp-slide-right-enter-from { opacity: 0; transform: translateX(-36px); }
    .rp-slide-right-leave-to   { opacity: 0; transform: translateX(36px); }

    /* Section label di mode open */
    .reminder-popup-section-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted, #6E6359);
      margin-bottom: 8px;
    }
    .reminder-popup-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .reminder-popup-dot-terra { background: var(--color-terracotta, #D67B52); }
    .reminder-popup-dot-sage  { background: var(--color-sage, #7FA882); }

    /* Info item (Section 1 di mode open) */
    .reminder-popup-item-info {
      border-left-color: var(--color-terracotta, #D67B52) !important;
      background: #FDF5EF !important;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .reminder-popup-item-icon {
      font-size: 15px; flex-shrink: 0; margin-top: 1px;
    }
    .reminder-popup-item-info-text { flex: 1; min-width: 0; }

    /* ── Reminder Popup Body: scrollable jika banyak item ── */
    .reminder-popup-body-scroll {
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--color-sand, #D9D0C3) transparent;
    }
    .reminder-popup-body-scroll::-webkit-scrollbar { width: 4px; }
    .reminder-popup-body-scroll::-webkit-scrollbar-track { background: transparent; }
    .reminder-popup-body-scroll::-webkit-scrollbar-thumb { background: var(--color-sand, #D9D0C3); border-radius: 4px; }

    /* ── Habit item in popup: clickable hover effect ── */
    .reminder-popup-item-habit-clickable {
      transition: background 0.15s, transform 0.12s;
      border-radius: 8px;
    }
    .reminder-popup-item-habit-clickable:hover {
      background: rgba(95, 133, 117, 0.08);
      transform: translateX(2px);
    }

    /* ── Habit row flash dari notif trigger ── */
    @keyframes habit-row-flash {
      0%   { background: transparent; }
      15%  { background: rgba(95, 133, 117, 0.18); }
      40%  { background: rgba(95, 133, 117, 0.10); }
      60%  { background: rgba(95, 133, 117, 0.20); }
      80%  { background: rgba(95, 133, 117, 0.08); }
      100% { background: transparent; }
    }
    .habit-row-notif-flash {
      animation: habit-row-flash 1.8s ease-out forwards;
    }

    /* ── Habit tree button pop animasi dari notif trigger ── */
    @keyframes habit-tree-pop {
      0%   { transform: scale(1); }
      20%  { transform: scale(0.7) rotate(-8deg); }
      50%  { transform: scale(1.5) rotate(5deg); }
      70%  { transform: scale(1.2) rotate(-3deg); }
      85%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .habit-day-btn-notif-pop {
      animation: habit-tree-pop 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* ── Manual Reminder button ── */
    .notif-add-manual-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      background: transparent;
      border: 1.5px dashed var(--color-terracotta, #D67B52);
      border-radius: 9px;
      color: var(--color-terracotta, #D67B52);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-style 0.15s;
      font-family: inherit;
    }
    .notif-add-manual-btn:hover {
      background: rgba(214, 123, 82, 0.07);
      border-style: solid;
    }

    /* ── Manual Reminder form box ── */
    .notif-manual-form {
      background: #FAFAF7;
      border: 1.5px solid var(--color-sand, #D9D0C3);
      border-radius: 10px;
      padding: 12px 14px;
    }

    /* ── Transition expand/collapse manual form ── */
    .notif-manual-expand-enter-active { animation: notif-manual-in 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .notif-manual-expand-leave-active { animation: notif-manual-in 0.15s ease-in reverse; }
    @keyframes notif-manual-in {
      from { opacity: 0; transform: translateY(-8px) scaleY(0.92); }
      to   { opacity: 1; transform: translateY(0) scaleY(1); }
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="app-container">
      <!-- View 1: Main Landing Dashboard (Desk) -->
      <div v-if="activePage === 'dashboard'" class="desk-viewport" ref="deskViewport">
        
        <!-- Decorative Stars scattered inside desk (Visual details matching Image 5) -->
        <span v-for="(star, idx) in stars" 
              :key="idx" 
              class="star-decorator" 
              :style="{ left: star.x + '%', top: star.y + '%' }">
          ★
        </span>
        <!-- Center Desk Title & Menu Button (Visual layout matching Image 2 & 5) -->
        <div class="desk-title-block">
          <h1 class="desk-title">What's on My Desk</h1>
          <p class="desk-subtitle">a hidden room of visuals, unlocked through creativity</p>
        </div>
        <!-- Scattered Icons/Objects mapping to Pages -->
        <!-- Drag-and-drop is supported; positions are saved automatically in localStorage -->
        <div v-for="(cfg, pageKey) in assignedIcons" 
             :key="pageKey" 
             class="desk-item" 
             :style="{ left: cfg.x + '%', top: cfg.y + '%' }"
             @mousedown="startDrag($event, pageKey)"
             @touchstart="startDrag($event, pageKey)"
             @click="handleIconClick(pageKey)"> <span class="desk-item-number text-mono">({{ cfg.num }})</span>
          
          <div class="desk-item-svg" :style="{ width: iconPool[cfg.iconId]?.width + 'px', height: iconPool[cfg.iconId]?.width + 'px' }">
            <img v-if="cfg.customUrl" :src="cfg.customUrl" style="width: 100%; height: 100%; object-fit: contain; pointer-events: none;" alt="Icon">
            <div v-else style="width: 100%; height: 100%; pointer-events: none;" v-html="iconPool[cfg.iconId]?.svg"></div>
          </div>
          
          <div class="desk-item-label">{{ cfg.label }} <span style="font-weight: normal; opacity: 0.6; display: block; font-size: 9px; margin-top: 2px;">(Klik / Tap untuk Buka)</span></div>
        </div>

        <!-- Floating Bell Notif in top-right corner of Desk -->
        <div class="desk-notif-float" @click.stop>
          <button class="desk-notif-float-btn" @click="showNotifPanel = !showNotifPanel" title="Notifikasi Hari Ini">
            🔔
            <span v-if="notifUnreadCount > 0" class="desk-notif-float-badge">{{ notifUnreadCount > 9 ? '9+' : notifUnreadCount }}</span>
          </button>
          <!-- Mini popover label saat hover -->
        </div>



        <!-- Floating Action Dock in bottom-corner for Theme and Desk Icon Styles -->
        <div class="floating-action-dock" @click.stop>
          <!-- 1. Desk Icons Configuration Floating Button -->
          <button class="desk-config-floating-btn" @click="showSettings = !showSettings" title="Pengaturan Ikon & Meja Kerja">
            ⚙️
          </button>

          <!-- 2. Color Theme Customizer Widget -->
          <div class="color-picker-widget-container" style="position: relative;">
            <button class="color-picker-btn" @click="showColorPicker = !showColorPicker" title="Ubah Warna Tema Dominan">
              🎨
            </button>
            <div v-if="showColorPicker" class="color-picker-popover">
              <div class="color-picker-title">
                <span>🎨</span> My mood colour web
              </div>
              <div class="theme-preset-grid">
                <span v-for="color in presetColors" 
                      :key="color.hex" 
                      class="theme-preset-dot" 
                      :class="{ active: dominantColor === color.hex }"
                      :style="{ backgroundColor: color.hex }" 
                      :title="color.label"
                      @click="setDominantColor(color.hex)">
                </span>
              </div>
              <div class="custom-color-input-wrapper">
                <span style="font-size: 11px;">Warna Kustom:</span>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span class="text-mono" style="font-size: 11.5px; color: var(--text-dark);">{{ dominantColor }}</span>
                  <input type="color" class="custom-color-picker-field" v-model="dominantColor" @input="setDominantColor(dominantColor)" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- View 2: Active Personal Subpage (Standard module pages) -->
      <div v-else class="page-module">

        <!-- ══════════════════════════════════════════════════════════ -->
        <!-- NAVBAR: Hamburger | my self | Live Clock                  -->
        <!-- ══════════════════════════════════════════════════════════ -->
        <nav class="ws-navbar">
          <!-- LEFT: Hamburger menu -->
          <button class="ws-nav-hamburger" @click="showNavDrawer = !showNavDrawer" :class="{ 'is-open': showNavDrawer }" aria-label="Navigation menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <!-- CENTER: Brand title -->
          <div class="ws-nav-brand" @click="navigateTo('dashboard')" title="Back to desk">
            my self
          </div>

          <!-- RIGHT: Notifikasi Bell + Live clock -->
          <div style="display: flex; align-items: center; gap: 6px;">
            <!-- Bell Notification Button -->
            <button class="ws-notif-btn" @click="showNotifPanel = !showNotifPanel" aria-label="Notifikasi" title="Notifikasi Hari Ini">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span v-if="notifUnreadCount > 0" class="ws-notif-badge">{{ notifUnreadCount > 9 ? '9+' : notifUnreadCount }}</span>
            </button>

          <!-- RIGHT: Live clock -->
          <div class="ws-nav-clock" id="ws-live-clock">
            <span class="ws-clock-day" id="ws-clock-day">—</span>
            <span class="ws-clock-date" id="ws-clock-date">—</span>
            <span class="ws-clock-time" id="ws-clock-time">--:--:--</span>
          </div>
          </div><!-- end right flex -->
        </nav>

        <!-- Navigation Drawer Overlay -->
        <transition name="ws-drawer-fade">
          <div v-if="showNavDrawer" class="ws-drawer-overlay" @click="showNavDrawer = false"></div>
        </transition>

        <!-- Navigation Drawer Panel -->
        <transition name="ws-drawer-slide">
          <div v-if="showNavDrawer" class="ws-nav-drawer">
            <div class="ws-drawer-header">
              <span class="ws-drawer-title">my pages</span>
              <button class="ws-drawer-close" @click="showNavDrawer = false">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>

            <!-- Back to desk -->
            <button class="ws-drawer-item ws-drawer-desk" @click="navigateTo('dashboard'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
              </span>
              <span class="ws-drawer-label">back to my desk</span>
            </button>

            <div class="ws-drawer-divider"></div>
            <p class="ws-drawer-section-label">pages</p>

            <!-- Page items -->
            <button class="ws-drawer-item" :class="{ active: activePage === 'jobLogbook' }" @click="navigateTo('jobLogbook'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">My 8-4 Job Logbook</span>
                <span class="ws-drawer-sub">pencatatan aktivitas harian kerja</span>
              </div>
              <span class="ws-drawer-num">01</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'calendarMoment' }" @click="navigateTo('calendarMoment'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Calendar Moment</span>

        <!-- Live clock JS injected here -->
        <script>
          (function() {
            function updateClock() {
              const now = new Date();
              const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
              const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
              const dayEl = document.getElementById('ws-clock-day');
              const dateEl = document.getElementById('ws-clock-date');
              const timeEl = document.getElementById('ws-clock-time');
              if (dayEl) dayEl.textContent = days[now.getDay()];
              if (dateEl) dateEl.textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
              if (timeEl) {
                const hh = String(now.getHours()).padStart(2,'0');
                const mm = String(now.getMinutes()).padStart(2,'0');
                const ss = String(now.getSeconds()).padStart(2,'0');
                timeEl.textContent = hh + ':' + mm + ':' + ss;
              }
            }
            updateClock();
            setInterval(updateClock, 1000);
          })();
        </script>

  <!-- Supabase Storage Layer (harus sebelum components.js & app.js) -->
  <script src="supabase-storage.js"></script>
  <script>
    // Tunggu WorkspaceStorage selesai init sebelum mount Vue app
    window._workspaceStorageReady.then(() => {
      // Dynamically load app scripts setelah storage ready
      const loadScript = (src) => new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
      loadScript('components.js').then(() => loadScript('notifications.js')).then(() => loadScript('app.js'));
    });
  </script>
