<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n-workspace</title>
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Load Vue 3 Global from CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Load SheetJS for Excel Exports and jsPDF + autoTable for PDF Exports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app" v-cloak>
    <div class="app-container">
      <!-- View 1: Main Landing Dashboard (Desk) -->
      <div v-if="activePage === 'dashboard'" class="desk-viewport" ref="deskViewport">
        
        <!-- Decorative Stars scattered inside desk (Visual details matching Image 5) -->
        <span v-for="(star, idx) in stars" 
              :key="idx" 
              class="star-decorator" 
              :style="{ left: star.x + '%', top: star.y + '%' }">
          ★
        </span>
        <!-- Center Desk Title & Menu Button (Visual layout matching Image 2 & 5) -->
        <div class="desk-title-block">
          <h1 class="desk-title">What's on My Desk</h1>
          <p class="desk-subtitle">a hidden room of visuals, unlocked through creativity</p>
        </div>
        <!-- Scattered Icons/Objects mapping to Pages -->
        <!-- Drag-and-drop is supported; positions are saved automatically in localStorage -->
        <div v-for="(cfg, pageKey) in assignedIcons" 
             :key="pageKey" 
             class="desk-item" 
             :style="{ left: cfg.x + '%', top: cfg.y + '%' }"
             @mousedown="startDrag($event, pageKey)"
             @touchstart="startDrag($event, pageKey)"
             @dblclick="navigateTo(pageKey)">
          
          <!-- Visual label code (01) etc matching reference Image 2 -->
          <span class="desk-item-number text-mono">({{ cfg.num }})</span>
          
          <!-- Custom image upload or Visual SVG illustration -->
          <div class="desk-item-svg" :style="{ width: iconPool[cfg.iconId]?.width + 'px', height: iconPool[cfg.iconId]?.width + 'px' }">
            <img v-if="cfg.customUrl" :src="cfg.customUrl" style="width: 100%; height: 100%; object-fit: contain; pointer-events: none;" alt="Icon">
            <div v-else style="width: 100%; height: 100%; pointer-events: none;" v-html="iconPool[cfg.iconId]?.svg"></div>
          </div>
          
          <!-- Tooltip on hover (dblclick to navigate) -->
          <div class="desk-item-label">{{ cfg.label }} <span style="font-weight: normal; opacity: 0.6; display: block; font-size: 9px; margin-top: 2px;">(Double-click untuk Buka)</span></div>
        </div>

        <!-- Floating Action Dock in bottom-corner for Theme and Desk Icon Styles -->
        <div class="floating-action-dock" @click.stop>
          <!-- 1. Desk Icons Configuration Floating Button -->
          <button class="desk-config-floating-btn" @click="showSettings = !showSettings" title="Pengaturan Ikon & Meja Kerja">
            ⚙️
          </button>

          <!-- 2. Color Theme Customizer Widget -->
          <div class="color-picker-widget-container" style="position: relative;">
            <button class="color-picker-btn" @click="showColorPicker = !showColorPicker" title="Ubah Warna Tema Dominan">
              🎨
            </button>
            <div v-if="showColorPicker" class="color-picker-popover">
              <div class="color-picker-title">
                <span>🎨</span> My mood colour web
              </div>
              <div class="theme-preset-grid">
                <span v-for="color in presetColors" 
                      :key="color.hex" 
                      class="theme-preset-dot" 
                      :class="{ active: dominantColor === color.hex }"
                      :style="{ backgroundColor: color.hex }" 
                      :title="color.label"
                      @click="setDominantColor(color.hex)">
                </span>
              </div>
              <div class="custom-color-input-wrapper">
                <span style="font-size: 11px;">Warna Kustom:</span>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span class="text-mono" style="font-size: 11.5px; color: var(--text-dark);">{{ dominantColor }}</span>
                  <input type="color" class="custom-color-picker-field" v-model="dominantColor" @input="setDominantColor(dominantColor)" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- View 2: Active Personal Subpage (Standard module pages) -->
      <div v-else class="page-module">

        <!-- ══════════════════════════════════════════════════════════ -->
        <!-- NAVBAR: Hamburger | my self | Live Clock                  -->
        <!-- ══════════════════════════════════════════════════════════ -->
        <nav class="ws-navbar">
          <!-- LEFT: Hamburger menu -->
          <button class="ws-nav-hamburger" @click="showNavDrawer = !showNavDrawer" :class="{ 'is-open': showNavDrawer }" aria-label="Navigation menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <!-- CENTER: Brand title -->
          <div class="ws-nav-brand" @click="navigateTo('dashboard')" title="Back to desk">
            my self
          </div>

          <!-- RIGHT: Live clock -->
          <div class="ws-nav-clock" id="ws-live-clock">
            <span class="ws-clock-day" id="ws-clock-day">—</span>
            <span class="ws-clock-date" id="ws-clock-date">—</span>
            <span class="ws-clock-time" id="ws-clock-time">--:--:--</span>
          </div>
        </nav>

        <!-- Navigation Drawer Overlay -->
        <transition name="ws-drawer-fade">
          <div v-if="showNavDrawer" class="ws-drawer-overlay" @click="showNavDrawer = false"></div>
        </transition>

        <!-- Navigation Drawer Panel -->
        <transition name="ws-drawer-slide">
          <div v-if="showNavDrawer" class="ws-nav-drawer">
            <div class="ws-drawer-header">
              <span class="ws-drawer-title">my pages</span>
              <button class="ws-drawer-close" @click="showNavDrawer = false">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>

            <!-- Back to desk -->
            <button class="ws-drawer-item ws-drawer-desk" @click="navigateTo('dashboard'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
              </span>
              <span class="ws-drawer-label">back to my desk</span>
            </button>

            <div class="ws-drawer-divider"></div>
            <p class="ws-drawer-section-label">pages</p>

            <!-- Page items -->
            <button class="ws-drawer-item" :class="{ active: activePage === 'jobLogbook' }" @click="navigateTo('jobLogbook'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">My 8-4 Job Logbook</span>
                <span class="ws-drawer-sub">pencatatan aktivitas harian kerja</span>
              </div>
              <span class="ws-drawer-num">01</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'calendarMoment' }" @click="navigateTo('calendarMoment'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Calendar Moment</span>
                <span class="ws-drawer-sub">kalender digital & catatan memo</span>
              </div>
              <span class="ws-drawer-num">02</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'contentTracker' }" @click="navigateTo('contentTracker'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Content Plan & Tracker</span>
                <span class="ws-drawer-sub">penjadwalan postingan konten</span>
              </div>
              <span class="ws-drawer-num">03</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'interviewPractice' }" @click="navigateTo('interviewPractice'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Interview Practice</span>
                <span class="ws-drawer-sub">latihan wawancara interaktif</span>
              </div>
              <span class="ws-drawer-num">04</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'dailyNutrition' }" @click="navigateTo('dailyNutrition'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10"></path></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Daily Nutrition & Insights</span>
                <span class="ws-drawer-sub">pelacakan nutrisi & asupan harian</span>
              </div>
              <span class="ws-drawer-num">05</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'habitTracker' }" @click="navigateTo('habitTracker'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Habit Tracker</span>
                <span class="ws-drawer-sub">grafik progress habit bulanan</span>
              </div>
              <span class="ws-drawer-num">06</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'pomodoroTimer' }" @click="navigateTo('pomodoroTimer'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h14"></path><path d="M5 22h14"></path><path d="M19 2v4c0 3-2.5 4.5-5 5.5c2.5 1 5 2.5 5 5.5v4"></path><path d="M5 2v4c0 3 2.5 4.5 5 5.5c-2.5 1-5 2.5-5 5.5v4"></path></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Pomodoro Timer</span>
                <span class="ws-drawer-sub">jam pasir fokus & istirahat</span>
              </div>
              <span class="ws-drawer-num">07</span>
            </button>

            <button class="ws-drawer-item" :class="{ active: activePage === 'googleCalendar' }" @click="navigateTo('googleCalendar'); showNavDrawer = false">
              <span class="ws-drawer-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"></path></svg>
              </span>
              <div class="ws-drawer-item-text">
                <span class="ws-drawer-label">Google Calendar</span>
                <span class="ws-drawer-sub">kalender google terintegrasi</span>
              </div>
              <span class="ws-drawer-num">08</span>
            </button>

            <!-- Drawer footer -->
            <div class="ws-drawer-footer">
              <button class="ws-drawer-item" :class="{ active: activePage === 'financialTracker' }" @click="navigateTo('financialTracker'); showNavDrawer = false">
                <span class="ws-drawer-icon">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                </span>
                <div class="ws-drawer-item-text">
                  <span class="ws-drawer-label">Financial Tracker</span>
                  <span class="ws-drawer-sub">tabungan, pengeluaran & reimburse</span>
                </div>
                <span class="ws-drawer-num">09</span>
              </button>
            </div>
              <span>✦ my personal workspace ✦</span>
            </div>
          </div>
        </transition>

        <!-- Live clock JS injected here -->
        <script>
          (function() {
            function updateClock() {
              const now = new Date();
              const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
              const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
              const dayEl = document.getElementById('ws-clock-day');
              const dateEl = document.getElementById('ws-clock-date');
              const timeEl = document.getElementById('ws-clock-time');
              if (dayEl) dayEl.textContent = days[now.getDay()];
              if (dateEl) dateEl.textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
              if (timeEl) {
                const hh = String(now.getHours()).padStart(2,'0');
                const mm = String(now.getMinutes()).padStart(2,'0');
                const ss = String(now.getSeconds()).padStart(2,'0');
                timeEl.textContent = hh + ':' + mm + ':' + ss;
              }
            }
            updateClock();
            setInterval(updateClock, 1000);
          })();
        </script>
        <!-- Render modular components dynamically based on active page -->
        <job-logbook v-if="activePage === 'jobLogbook'"></job-logbook>
        <calendar-moment v-if="activePage === 'calendarMoment'"></calendar-moment>
        <content-tracker v-if="activePage === 'contentTracker'"></content-tracker>
        <interview-practice v-if="activePage === 'interviewPractice'"></interview-practice>
        <daily-nutrition v-if="activePage === 'dailyNutrition'"></daily-nutrition>
        <pomodoro-timer v-if="activePage === 'pomodoroTimer'"></pomodoro-timer>
        <google-calendar v-if="activePage === 'googleCalendar'"></google-calendar>
        <financial-tracker v-if="activePage === 'financialTracker'"></financial-tracker>
        <!-- Dynamic Month state passed to Habit Tracker component -->
        <habit-tracker v-if="activePage === 'habitTracker'"
                       :current-year-month="habitYearMonth"
                       :days-in-month="habitDaysInMonth"
                       :active-month-key="habitMonthKey"
                       @prev-month="prevMonth"
                       @next-month="nextMonth"></habit-tracker>

        <!-- Footer -->
        <footer style="margin-top: 48px; padding: 24px 0 16px; border-top: 1.5px solid var(--color-sand); text-align: start;">
          <p style="font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 8px;">
            built by <span style="color: var(--color-terracotta); font-weight: 700;">nadyanah</span>
            for my self
          </p>
        </footer>
      </div>
      <!-- Icon Config Side Drawer mapping menu -->
      <icon-manager v-if="showSettings" 
                    :assigned-icons="assignedIcons" 
                    :available-icons="availableIconsList"
                    :pool="iconPool"
                    @close="showSettings = false"
                    @update-mapping="handleUpdateMapping"
                    @reset-layout="resetLayout">
      </icon-manager>
      <!-- Floating Countdown Timer — Global Persistent (muncul di halaman lain saat timer berjalan) -->
      <floating-countdown-timer :active-page="activePage"></floating-countdown-timer>
    </div>
  </div>
  <!-- Firebase Compat CDN Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <!-- Assets and App scripts -->
  <script src="assets.js"></script>
  <!-- Supabase Storage Layer (harus sebelum components.js & app.js) -->
  <script src="supabase-storage.js"></script>
  <script>
    // Tunggu WorkspaceStorage selesai init sebelum mount Vue app
    window._workspaceStorageReady.then(() => {
      // Dynamically load app scripts setelah storage ready
      const loadScript = (src) => new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
      loadScript('components.js').then(() => loadScript('app.js'));
    });
  </script>
</body>
</html>
